<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Ménsula Alineada</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0b0f19; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #info-panel {
            position: absolute; top: 10px; left: 10px; background: rgba(15, 23, 42, 0.85);
            color: #fff; padding: 15px; border-radius: 8px; border: 1px solid #334155;
            max-width: 300px; font-size: 13px; pointer-events: none; z-index: 10;
        }
        h3 { margin: 0 0 8px 0; color: #f97316; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="info-panel">
        <h3>Ajuste de Precisión 3D</h3>
        <p id="status">⏳ Descargando desde Supabase...</p>
        <p id="dimensiones">Dimensiones: Analizando...</p>
        <p style="color: #64748b; font-size: 11px; margin-top: 10px;">
            * Usa el mouse para rotar e interactuar.<br>
            * Líneas: Roja (X), Verde (Y), Azul (Z).
        </p>
    </div>

    <div id="canvas-container"></div>

    <script>
        const container = document.getElementById('canvas-container');
        const statusText = document.getElementById('status');
        const dimText = document.getElementById('dimensiones');

        // 1. ESCENARIO E ILUMINACIÓN GLOBAL
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(1.5, 1.5, 2); // Cámara posicionada en un ángulo ideal

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.4, 0); // La cámara apunta ligeramente hacia arriba de la rejilla

        // Iluminación potente
        scene.add(new THREE.AmbientLight(0xffffff, 1.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Guías de ejes (XYZ)
        const axesHelper = new THREE.AxesHelper(3);
        scene.add(axesHelper);

        // Cuadrícula del suelo
        const gridHelper = new THREE.GridHelper(10, 20, 0x475569, 0x334155);
        scene.add(gridHelper);

        // 2. CARGADOR CON CORRECCIÓN DE ALTURA
        const loader = new THREE.GLTFLoader();
        
        // Tu URL directa y funcional de Supabase
        const urlPublica3D = "https://ltetbljizxngcwszyzmn.supabase.co/storage/v1/object/public/modelos/modelos%203d%20de%20racks/MENSULA_GOTA_CARGA_LIGERA_DERECHA.glb";

        loader.load(urlPublica3D, (gltf) => {
            const modelo = gltf.scene;
            statusText.innerText = "✅ Cargado correctamente.";
            statusText.style.color = "#22c55e";

            // Medimos el volumen exacto del modelo CAD
            const box = new THREE.Box3().setFromObject(modelo);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            dimText.innerHTML = `<b>Ancho:</b> ${size.x.toFixed(3)}m<br><b>Alto:</b> ${size.y.toFixed(3)}m<br><b>Fondo:</b> ${size.z.toFixed(3)}m`;

            // Autoescalado por si las unidades del software CAD vienen alteradas
            const maxDim = Math.max(size.x, size.y, size.z);
            let factorEscala = 1.0;
            if (maxDim > 5 || maxDim < 0.05) {
                factorEscala = 1.0 / maxDim;
                modelo.scale.set(factorEscala, factorEscala, factorEscala);
            }

            // 🛠️ ALINEACIÓN DE PIVOTE INDUSTRIAL (CORRECCIÓN CRÍTICA)
            // Centramos la pieza en X y Z. 
            // En Y (altura), sumamos la mitad de su tamaño real para forzar a que su base toque la rejilla.
            modelo.position.x = -center.x * factorEscala;
            modelo.position.y = ((size.y / 2) - center.y) * factorEscala; 
            modelo.position.z = -center.z * factorEscala;

            scene.add(modelo);

        }, (xhr) => {
            if (xhr.total > 0) {
                const porcentaje = Math.round((xhr.loaded / xhr.total) * 100);
                statusText.innerText = `⏳ Descargando: ${porcentaje}%`;
            }
        }, (error) => {
            console.error("Error al procesar el GLB:", error);
            statusText.innerText = "❌ Error en el archivo de Supabase.";
            statusText.style.color = "#ef4444";
        });

        // 3. LOOP ANIMACIÓN
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
