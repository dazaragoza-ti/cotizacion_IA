<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de Racks 3D - Autologin</title>
    <link rel="icon" href="data:,">
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js](https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js)"></script>
    <script src="[https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js](https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js)"></script>
    <script src="[https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2](https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2)"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">
    <header class="bg-slate-800 p-4 flex justify-between items-center border-b border-slate-700 shadow-lg">
        <h1 class="font-bold text-lg">RackBuilder 3D</h1>
        <div id="panel-credenciales" class="flex gap-2 text-xs">
            <input type="text" id="db-url" placeholder="Supabase URL" class="bg-slate-950 p-1.5 rounded text-white border border-slate-700">
            <input type="password" id="db-key" placeholder="Anon Key" class="bg-slate-950 p-1.5 rounded text-white border border-slate-700">
            <button id="btn-conectar" class="bg-indigo-600 px-4 py-1.5 rounded font-bold">Conectar</button>
        </div>
        <div id="badge-autologin" class="hidden bg-emerald-950 text-emerald-400 text-xs px-3.5 py-1.5 rounded-full font-semibold">
            <span>Acceso Inteligente por Enlace Activo</span>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-4 gap-4 p-4">
        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col justify-between">
            <div class="space-y-4">
                <div>
                    <h2 class="text-sm text-slate-400">Estado</h2>
                    <span id="status" class="text-red-400 font-bold text-sm">Desconectado</span>
                </div>
                <hr class="border-slate-700">
                <div id="info" class="text-xs space-y-3">
                    <p class="text-slate-400 italic">Esperando sincronización...</p>
                </div>
                <div class="bg-slate-950 p-3 rounded-lg">
                    <div id="console-log" class="text-[10px] font-mono text-slate-400 h-28 overflow-y-auto"></div>
                </div>
            </div>
        </div>
        <div class="lg:col-span-3 bg-slate-950 rounded-xl min-h-[550px] border border-slate-800" id="canvas-container"></div>
    </main>

    <script>
        let scene, camera, renderer, controls, group;
        let supabaseClient = null;
        let targetSessionId = null;
        const container = document.getElementById('canvas-container');

        function debugLog(mensaje, esError = false) {
            const consola = document.getElementById('console-log');
            consola.innerHTML += `<p class="${esError ? 'text-red-400' : 'text-slate-300'}">&gt; ${mensaje}</p>`;
            consola.scrollTop = consola.scrollHeight;
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x090d16);
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(4, 4, 8);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth || 800, container.clientHeight || 550);
            container.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            group = new THREE.Group();
            scene.add(group);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            let dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);
            scene.add(new THREE.GridHelper(20, 20, 0x4338ca, 0x1e293b));
            animate();
            checarAutoLoginURL();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function renderRack(matriz) {
            while(group.children.length > 0) { group.remove(group.children[0]); }
            if (!matriz) return;

            if(matriz.marcos) {
                matriz.marcos.forEach(m => {
                    const geo = new THREE.BoxGeometry(0.1, 4, 1);
                    const mat = new THREE.MeshStandardMaterial({ color: 0x1e293b });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(m.posicion.x, m.posicion.y + 2, m.posicion.z);
                    group.add(mesh);
                });
            }
            if(matriz.vigas) {
                matriz.vigas.forEach(v => {
                    const geo = new THREE.BoxGeometry(2.4, 0.12, 0.06);
                    const mat = new THREE.MeshStandardMaterial({ color: 0xeab308 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(v.posicion.x, v.posicion.y, v.posicion.z);
                    group.add(mesh);
                });
            }
            if(matriz.mensulas) {
                matriz.mensulas.forEach(men => {
                    const geo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
                    const mat = new THREE.MeshStandardMaterial({ color: 0x64748b });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(men.posicion.x, men.posicion.y, men.posicion.z);
                    group.add(mesh);
                });
            }
        }

        async function checarNuevasCotizaciones() {
            if (!supabaseClient) return;
            let query = supabaseClient.from('disenos_racks').select('*').order('version_actual', { ascending: false });
            if (targetSessionId) { query = query.eq('session_id', targetSessionId); }
            const { data, error } = await query.limit(1);
            
            if (data && data.length > 0) {
                const fila = data[0];
                let jsonDiseno = typeof fila.matriz_ensamble_3d === 'string' ? JSON.parse(fila.matriz_ensamble_3d) : fila.matriz_ensamble_3d;
                document.getElementById('info').innerHTML = `<b>Modelo:</b> ${jsonDiseno.tipo_rack}<br><b>Carga:</b> ${jsonDiseno.peso_maximo_por_nivel_kg} kg/nivel`;
                renderRack(jsonDiseno);
            }
        }

        function checarAutoLoginURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawUrl = urlParams.get('sb_url');
            const rawKey = urlParams.get('sb_key');
            if (rawUrl && rawKey) {
                targetSessionId = urlParams.get('session_id');
                conectarSupabase(decodeURIComponent(rawUrl), decodeURIComponent(rawKey), true);
            }
        }

        function conectarSupabase(url, key, isAutoLogin = false) {
            supabaseClient = supabase.createClient(url, key);
            document.getElementById('status').innerText = "Conectado";
            document.getElementById('status').className = "text-emerald-400 font-bold";
            if (isAutoLogin) {
                document.getElementById('panel-credenciales').classList.add('hidden');
                document.getElementById('badge-autologin').classList.remove('hidden');
            }
            checarNuevasCotizaciones();
            supabaseClient.channel('cambios_disenos').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'disenos_racks' }, payload => {
                if (!targetSessionId || payload.new.session_id === targetSessionId) { checarNuevasCotizaciones(); }
            }).subscribe();
        }

        document.getElementById('btn-conectar').addEventListener('click', () => {
            conectarSupabase(document.getElementById('db-url').value.trim(), document.getElementById('db-key').value.trim(), false);
        });

        window.onload = init3D;
    </script>
</body>
</html>
