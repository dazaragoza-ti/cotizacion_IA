name: rackbuilder_dashboard
description: Panel de control RackBuilder — compresión Draco y entrenamiento IA.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.6
  http: ^1.2.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  flutter_dotenv: ^6.0.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  file_picker: ^11.0.2
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  equatable: ^2.0.5
  dio: ^5.7.0
  model_viewer_plus: ^1.9.3
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
