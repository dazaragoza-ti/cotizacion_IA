<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de Racks 3D</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">
    <header class="bg-slate-800 p-4 flex justify-between items-center border-b border-slate-700">
        <h1 class="font-bold text-lg">RackBuilder 3D</h1>
        <div class="flex gap-2 text-xs">
            <input type="text" id="db-url" placeholder="Supabase URL" class="bg-slate-950 p-1.5 rounded text-white border border-slate-700 w-48">
            <input type="password" id="db-key" placeholder="Anon Key" class="bg-slate-950 p-1.5 rounded text-white border border-slate-700 w-48">
            <button id="btn-conectar" class="bg-indigo-600 hover:bg-indigo-500 transition-colors px-4 py-1.5 rounded font-bold">Conectar</button>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-4 gap-4 p-4">
        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col justify-between">
            <div>
                <h2 class="font-semibold text-sm text-slate-400 mb-2">Estado: <span id="status" class="text-red-400">Desconectado</span></h2>
                <hr class="border-slate-700 my-3">
                <div id="info" class="text-xs space-y-3 mt-4">
                    <p class="text-slate-400 italic">Esperando conexión a Supabase y datos desde el bot de Telegram...</p>
                </div>
            </div>
            <div class="text-[10px] text-slate-500 text-center mt-4">
                Usa el comando de renderizado automático por Telegram para actualizar la matriz.
            </div>
        </div>
        
        <div class="lg:col-span-3 bg-slate-950 rounded-xl relative min-h-[550px]" id="canvas-container"></div>
    </main>

    <script>
        let scene, camera, renderer, controls, group;
        let supabaseClient = null;
        const container = document.getElementById('canvas-container');

        // 1. Inicializar el motor gráfico 3D
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x090d16);
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(4, 4, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            group = new THREE.Group();
            scene.add(group);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const gridHelper = new THREE.GridHelper(20, 20, 0x4338ca, 0x1e293b);
            scene.add(gridHelper);
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // 2. Renderizar geometrías espaciales
        function renderRack(matriz) {
            while(group.children.length > 0) { 
                group.remove(group.children[0]); 
            }
            
            if (!matriz) return;

            if(matriz.marcos && Array.isArray(matriz.marcos)) {
                matriz.marcos.forEach(m => {
                    const geo = new THREE.BoxGeometry(0.1, 4, 1);
                    const mat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.5 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(m.posicion.x, m.posicion.y + 2, m.posicion.z);
                    group.add(mesh);
                });
            }

            if(matriz.vigas && Array.isArray(matriz.vigas)) {
                matriz.vigas.forEach(v => {
                    const geo = new THREE.BoxGeometry(2.4, 0.12, 0.06);
                    const mat = new THREE.MeshStandardMaterial({ color: 0xeab308, metalness: 0.2 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(v.posicion.x, v.posicion.y, v.posicion.z);
                    group.add(mesh);
                });
            }

            if(matriz.mensulas && Array.isArray(matriz.mensulas)) {
                matriz.mensulas.forEach(men => {
                    const geo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
                    const mat = new THREE.MeshStandardMaterial({ color: 0x64748b });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(men.posicion.x, men.posicion.y, men.posicion.z);
                    group.add(mesh);
                });
            }
        }

        // 3. Consulta limpia a disenos_racks (Sin romper por tablas vacías)
        async function sincronizarUltimoDiseno() {
            if (!supabaseClient) return;
            
            try {
                const { data, error } = await supabaseClient
                    .from('disenos_racks')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(1); // Evita error PGRST116 si la tabla está en 0 filas

                if (error) {
                    console.error("Error en disenos_racks:", error);
                    return;
                }

                if (data && data.length > 0) {
                    const fila = data[0];
                    const variables = fila.matriz_ensamble_3d;
                    
                    document.getElementById('info').innerHTML = `
                        <div class="space-y-1.5">
                            <p class="font-bold text-indigo-400 text-sm">Diseño Activo (v${fila.version_actual || 1})</p>
                            <p><b>Vendedor:</b> ${fila.vendedor_id || 'Desconocido'}</p>
                            <p><b>Modelo:</b> ${variables.tipo_rack || 'Personalizado'}</p>
                            <p><b>Capacidad:</b> ${variables.peso_maximo_por_nivel_kg || 0} kg</p>
                            <p><b>Niveles:</b> ${variables.numero_niveles || 0}</p>
                            <p class="text-slate-400 mt-2 bg-slate-950 p-2 rounded border border-slate-700 text-[11px]">
                                <b>Original:</b> "${fila.solicitud_original || 'Sin texto'}"
                            </p>
                        </div>
                    `;

                    if (variables.matriz_ensamble_3d) {
                        renderRack(variables.matriz_ensamble_3d);
                    } else {
                        renderRack(variables);
                    }
                } else {
                    document.getElementById('info').innerHTML = `<p class="text-slate-400 italic">No hay registros en 'disenos_racks'. Envía un requerimiento desde Telegram.</p>`;
                }
            } catch (err) {
                console.error("Error crítico de sincronización:", err);
            }
        }

        // 4. Inicializar Conexión y canales en tiempo real
        document.getElementById('btn-conectar').addEventListener('click', () => {
            const url = document.getElementById('db-url').value.trim();
            const key = document.getElementById('db-key').value.trim();
            
            if(!url || !key) {
                alert("Por favor ingresa las credenciales de Supabase.");
                return;
            }

            try {
                supabaseClient = supabase.createClient(url, key);
                
                document.getElementById('status').innerText = "Conectado";
                document.getElementById('status').className = "text-emerald-400 font-bold";
                
                // Carga inicial
                sincronizarUltimoDiseno();

                // Escucha reactiva en tiempo real de la tabla de diseño
                supabaseClient
                    .channel('realtime_racks')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'disenos_racks' }, payload => {
                        console.log("Nuevo diseño detectado:", payload.new);
                        sincronizarUltimoDiseno();
                    })
                    .subscribe();

            } catch (err) {
                alert("Error de inicialización con el cliente de Supabase.");
            }
        });

        window.addEventListener('resize', () => {
            if (!camera || !renderer) return;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        window.onload = init3D;
    </script>
</body>
</html>
