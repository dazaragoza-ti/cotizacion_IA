<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Racks - Sincronización Real-Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden">

    <header class="bg-gray-800 p-4 shadow-lg flex justify-between items-center z-10">
        <h1 class="text-xl font-bold text-orange-500">Fábrica Digital - Control de Componentes Reales</h1>
        <div class="flex items-center gap-2">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <div class="text-sm text-gray-400">Escuchando Bot de Telegram...</div>
        </div>
    </header>

    <div class="flex flex-1 h-full relative">
        <div class="w-80 bg-gray-800 p-6 shadow-2xl flex flex-col gap-4 z-10 overflow-y-auto">
            <h2 class="text-lg font-semibold border-b border-gray-700 pb-2 text-gray-300">Datos del PDF (IA)</h2>
            
            <div>
                <label class="text-xs text-gray-400 block font-medium">ESTADO DEL MODELO</label>
                <div id="data-status" class="bg-gray-700 p-2 rounded mt-1 font-mono text-yellow-400 text-xs">Conectando...</div>
            </div>

            <div>
                <label class="text-xs text-gray-400 block font-medium">NÚMERO DE NIVELES SOLICITADOS</label>
                <div id="data-niveles" class="bg-gray-700 p-2 rounded mt-1 font-mono text-lg text-orange-400 font-bold">0</div>
            </div>

            <div>
                <label class="text-xs text-gray-400 block font-medium">PESO SOPORTADO MÁXIMO</label>
                <div id="data-peso" class="bg-gray-700 p-2 rounded mt-1 font-mono text-green-400">0 kg</div>
            </div>

            <div class="mt-4 bg-gray-950 p-3 rounded border border-gray-700 flex-1">
                <span class="text-xs font-bold text-blue-400 block mb-1">💡 Comentarios del Cliente:</span>
                <p id="data-comentarios" class="text-xs text-gray-400 leading-relaxed">Esperando lectura de cotización nueva...</p>
            </div>
        </div>

        <div id="canvas-container" class="flex-1 w-full h-full bg-gray-950"></div>
    </div>

    <script>
        // 🔌 1. CONFIGURACIÓN DE CREDENCIALES (Coloca tus llaves aquí)
        const SUPABASE_URL = "https://ltetbljizxngcwszyzmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0ZXRibGppenhuZ2N3c3p5em1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTc0MzMsImV4cCI6MjA5Nzg5MzQzM30.ThZMYsYyHv0eC2PxSV-NmqJySwSY3Y32tK8QrHEivaw";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let ultimoIdProcesado = null;

        // 🎬 2. ESCENARIO THREE.JS
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.01, 1000);
        camera.position.set(2, 2, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.5, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 1.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        scene.add(new THREE.GridHelper(10, 20, 0x475569, 0x334155));

        // Grupo contenedor para poder limpiar e ir agregando clones dinámicamente
        let rackGroup = new THREE.Group();
        scene.add(rackGroup);

        // 📦 3. CARGAR LA PIEZA MAESTRA DESDE SUPABASE STORAGE
        const loader = new THREE.GLTFLoader();
        const urlPublica3D = "https://ltetbljizxngcwszyzmn.supabase.co/storage/v1/object/public/modelos/modelos%203d%20de%20racks/MENSULA_GOTA_CARGA_LIGERA_DERECHA.glb";
        
        let modeloMensulaMaster = null;
        let alturaPiezaMetros = 0.3; // Resguardo por defecto si falla la medición inicial

        document.getElementById('data-status').innerText = "⏳ Descargando GLB...";

        loader.load(urlPublica3D, (gltf) => {
            modeloMensulaMaster = gltf.scene;
            
            document.getElementById('data-status').innerText = "✅ GLB En Memoria";
            document.getElementById('data-status').className = "bg-gray-700 p-2 rounded mt-1 font-mono text-green-400 text-xs";

            // Calculamos sus dimensiones reales
            const box = new THREE.Box3().setFromObject(modeloMensulaMaster);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            // Centramos la geometría original sobre su pivote
            modeloMensulaMaster.position.x = -center.x;
            modeloMensulaMaster.position.y = (size.y / 2) - center.y;
            modeloMensulaMaster.position.z = -center.z;
            
            alturaPiezaMetros = size.y; // Guardamos su altura exacta para el apilamiento

            // Arrancamos el ciclo de consulta a la Base de Datos una vez cargado el modelo
            checarNuevasCotizaciones();
        }, undefined, (error) => {
            console.error(error);
            document.getElementById('data-status').innerText = "❌ Error en GLB";
        });

        // 🔄 4. ENSAMBLADOR DINÁMICO (APILADOR COORDENADA Y)
        function generarEstructuraParametrica(niveles) {
            // Limpiamos los clones generados en la iteración anterior
            while(rackGroup.children.length > 0){ 
                rackGroup.remove(rackGroup.children[0]); 
            }

            if (!modeloMensulaMaster) return;

            // Simulamos la separación de los niveles industriales del rack (ej: cada 45 cm)
            const separacionEntreNiveles = alturaPiezaMetros + 0.25; 

            for (let i = 0; i < niveles; i++) {
                const mensulaClonada = modeloMensulaMaster.clone();
                
                // Desplazamos hacia arriba en el eje Y por cada nivel solicitado
                mensulaClonada.position.y += (i * separacionEntreNiveles);
                
                rackGroup.add(mensulaClonada);
            }
        }

        // 📡 5. CONSULTA DE BASE DE DATOS (POLLING)
        async function checarNuevasCotizaciones() {
            try {
                const { data, error } = await supabaseClient
                    .from('cotizaciones')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .single();

                if (error) throw error;
                if (!data) return;

                // Evitamos procesar si no hay cambios en la base de datos
                if (data.id === ultimoIdProcesado) return;
                ultimoIdProcesado = data.id;

                const variables = data.variables_json;

                // Actualizar Panel de Control UI
                document.getElementById('data-niveles').innerText = variables.numero_niveles || 1;
                document.getElementById('data-peso').innerText = (variables.peso_maximo_por_nivel_kg || 0).toLocaleString() + " kg";
                document.getElementById('data-comentarios').innerText = variables.comentarios_adicionales || "Sin anotaciones en el PDF.";

                // Ejecutar la clonación paramétrica en tiempo real
                const nivelesSolicitados = parseInt(variables.numero_niveles) || 1;
                generarEstructuraParametrica(nivelesSolicitados);

            } catch (err) {
                console.error("Error consultando la base de datos:", err);
            }
        }

        // Revisar actualizaciones en la base de datos cada 4 segundos
        setInterval(checarNuevasCotizaciones, 4000);

        // Bucle continuo de renderizado de la escena
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
