<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Control de Piezas Reales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden">

    <header class="bg-gray-800 p-4 shadow-lg flex justify-between items-center z-10">
        <h1 class="text-xl font-bold text-orange-500">Plataforma Racks Industrial - Visor de Componentes Reales</h1>
        <div class="flex items-center gap-2">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <div class="text-sm text-gray-400">Renderizado de Fábrica Activo</div>
        </div>
    </header>

    <div class="flex flex-1 h-full relative">
        <div class="w-80 bg-gray-800 p-6 shadow-2xl flex flex-col gap-4 z-10 overflow-y-auto">
            <h2 class="text-lg font-semibold border-b border-gray-700 pb-2 text-gray-300">Variables Detectadas</h2>
            
            <div>
                <label class="text-xs text-gray-400 block font-medium">TIPO DE RACK / PIEZA</label>
                <div id="data-tipo" class="bg-gray-700 p-2 rounded mt-1 font-mono text-orange-400">Cargando GLB...</div>
            </div>

            <div>
                <label class="text-xs text-gray-400 block font-medium">NÚMERO DE NIVELES (REPETICIONES)</label>
                <div id="data-niveles" class="bg-gray-700 p-2 rounded mt-1 font-mono">0</div>
            </div>

            <div>
                <label class="text-xs text-gray-400 block font-medium">PESO MÁXIMO POR NIVEL</label>
                <div id="data-peso" class="bg-gray-700 p-2 rounded mt-1 font-mono text-green-400">0 kg</div>
            </div>

            <div class="mt-4 bg-gray-950 p-3 rounded border border-gray-700 flex-1">
                <span class="text-xs font-bold text-blue-400 block mb-1">💡 Notas Técnicas de la IA:</span>
                <p id="data-comentarios" class="text-xs text-gray-400 leading-relaxed font-sans">Sincronizando gemelo digital desde el archivo adjunto...</p>
            </div>
        </div>

        <div id="canvas-container" class="flex-1 w-full h-full bg-gray-950"></div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DE SUPABASE ---
        const SUPABASE_URL = "https://ltetbljizxngcwszyzmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0ZXRibGppenhuZ2N3c3p5em1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTc0MzMsImV4cCI6MjA5Nzg5MzQzM30.ThZMYsYyHv0eC2PxSV-NmqJySwSY3Y32tK8QrHEivaw";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let ultimoIdProcesado = null;

        // --- 2. CONFIGURACIÓN DEL ESCENARIO THREE.JS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a); // Fondo Slate Oscuro

        const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.01, 1000);
        camera.position.set(1.5, 1.5, 2); // Cámara más cerca para apreciar la pieza pequeña

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.5, 0);

        // Iluminación optimizada para metales e ingeniería industrial
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Rejilla de guía en el suelo escalada
        const gridHelper = new THREE.GridHelper(10, 20, 0x475569, 0x334155);
        scene.add(gridHelper);

        let rackGroup = new THREE.Group();
        scene.add(rackGroup);

        // --- 3. CARGADOR DE MODELOS 3D GLTF/GLB REALES ---
        const loader = new THREE.GLTFLoader();
        let modeloMensulaBase = null;

        // Carga asíncrona de tu componente real en GitHub Pages
        loader.load('(RL0036)_MENSULA_GOTA_CARGA_LIGERA_DERECHA.glb', (gltf) => {
            modeloMensulaBase = gltf.scene;
            console.log("¡Ménsula Gota cargada con éxito desde la raíz!");
            
            // Forzamos un renderizado inicial de prueba apenas descarga
            rackGroup.add(modeloMensulaBase);
            
            // Si Supabase ya respondió antes de que terminara la descarga, procesamos los niveles acumulados
            cargarUltimaCotizacion();
        }, undefined, (error) => {
            console.error("Error crítico cargando el archivo GLB:", error);
            document.getElementById('data-tipo').innerText = "Error al leer GLB";
        });

        // --- 4. ENSAMBLADOR PARAMÉTRICO DE MODELOS REALES ---
        function construirRackConModelosReales(niveles) {
            // Limpiar renderizados previos en el grupo
            while(rackGroup.children.length > 0){ 
                rackGroup.remove(rackGroup.children[0]); 
            }

            // Si el archivo .glb aún no se descarga de GitHub, salimos del paso temporalmente
            if (!modeloMensulaBase) {
                console.log("Esperando descarga del modelo base...");
                return;
            }

            // Al ser una ménsula (pieza unitaria), la multiplicamos verticalmente
            // como columnas/niveles para validar la reactividad del sistema
            const alturaIntervalo = 0.4; // Ajustado a metros para simular repisas

            for (let i = 1; i <= niveles; i++) {
                const piezaClonada = modeloMensulaBase.clone();
                piezaClonada.position.set(0, (i - 1) * alturaIntervalo, 0);
                rackGroup.add(piezaClonada);
            }
        }

        // --- 5. ENLACE RECOLECTOR EN TIEMPO REAL (SUPABASE POLLING) ---
        async function cargarUltimaCotizacion() {
            try {
                const { data, error } = await supabaseClient
                    .from('cotizaciones')
                    .select('*')
                    .order('created_at', { ascending: false }) 
                    .limit(1)
                    .single();

                if (error) throw error;
                if (!data) return;

                // Evitamos re-renderizados idénticos innecesarios
                if (data.id === ultimoIdProcesado) return;
                ultimoIdProcesado = data.id;

                const variables = data.variables_json;

                // Inyección dinámica en el panel lateral HTML
                document.getElementById('data-tipo').innerText = variables.tipo_rack || "Ménsula Gota Detectada";
                document.getElementById('data-niveles').innerText = variables.numero_niveles || 1;
                document.getElementById('data-peso').innerText = (variables.peso_maximo_por_nivel_kg || 0).toLocaleString() + " kg";
                document.getElementById('data-comentarios').innerText = variables.comentarios_adicionales || "Sin anotaciones.";

                // Construcción automatizada en el motor 3D
                const cantNiveles = parseInt(variables.numero_niveles) || 1;
                construirRackConModelosReales(cantNiveles);

            } catch (err) {
                console.error("Error en sincronización con piezas reales:", err);
            }
        }

        // Ejecución cíclica cada 4 segundos
        setInterval(() => {
            cargarUltimaCotizacion();
        }, 4000);

        // Loop de renderizado continuo para animación fluida de cámara
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Soporte responsivo para pantallas móviles y tabletas
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
