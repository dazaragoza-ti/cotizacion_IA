<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D de Racks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden">

    <header class="bg-gray-800 p-4 shadow-lg flex justify-between items-center z-10">
        <h1 class="text-xl font-bold text-orange-500">Plataforma Racks Industrial - Visualizador 3D</h1>
        <div class="flex items-center gap-2">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <div class="text-sm text-gray-400">Sincronización Automática Activa</div>
        </div>
    </header>

    <div class="flex flex-1 h-full relative">
        <div class="w-80 bg-gray-800 p-6 shadow-2xl flex flex-col gap-4 z-10 overflow-y-auto">
            <h2 class="text-lg font-semibold border-b border-gray-700 pb-2 text-gray-300">Variables Detectadas</h2>
            
            <div>
                <label class="text-xs text-gray-400 block font-medium">TIPO DE RACK</label>
                <div id="data-tipo" class="bg-gray-700 p-2 rounded mt-1 font-mono text-orange-400">Conectando...</div>
            </div>

            <div>
                <label class="text-xs text-gray-400 block font-medium">NÚMERO DE NIVELES</label>
                <div id="data-niveles" class="bg-gray-700 p-2 rounded mt-1 font-mono">0</div>
            </div>

            <div>
                <label class="text-xs text-gray-400 block font-medium">PESO MÁXIMO POR NIVEL</label>
                <div id="data-peso" class="bg-gray-700 p-2 rounded mt-1 font-mono text-green-400">0 kg</div>
            </div>

            <div class="mt-4 bg-gray-950 p-3 rounded border border-gray-700 flex-1">
                <span class="text-xs font-bold text-blue-400 block mb-1">💡 Notas Técnicas de la IA:</span>
                <p id="data-comentarios" class="text-xs text-gray-400 leading-relaxed font-sans">Consultando últimas actualizaciones de cotización...</p>
            </div>
            
            <div class="text-[10px] text-gray-500 text-center border-t border-gray-700 pt-2">
                Monitoreando cambios en Supabase en tiempo real.
            </div>
        </div>

        <div id="canvas-container" class="flex-1 w-full h-full bg-gray-950"></div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN E INICIALIZACIÓN DE SUPABASE ---
        // REEMPLAZA ESTOS VALORES CON LAS CREDENCIALES DE TU PROYECTO
        const SUPABASE_URL = "https://ltetbljizxngcwszyzmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0ZXRibGppenhuZ2N3c3p5em1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTc0MzMsImV4cCI6MjA5Nzg5MzQzM30.ThZMYsYyHv0eC2PxSV-NmqJySwSY3Y32tK8QrHEivaw";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Variables de control para evitar re-renderizados innecesarios si los datos no cambian
        let ultimoIdProcesado = null;

        // --- 2. CONFIGURACIÓN DE SCENE & THREE.JS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a); // Fondo Slate oscuro

        // Cámara
        const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(4, 4, 6);

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Controles de mouse OrbitControls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.5, 0);

        // Iluminación
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Rejilla de guía en el suelo
        const gridHelper = new THREE.GridHelper(20, 20, 0x475569, 0x334155);
        scene.add(gridHelper);

        // Grupo contenedor para los elementos del Rack
        let rackGroup = new THREE.Group();
        scene.add(rackGroup);

        // --- 3. LÓGICA DE RENDERIZADO 3D (POSTES Y VIGAS) ---
        function dibujarRack3D(niveles) {
            // Limpiar renderizados previos del rack
            while(rackGroup.children.length > 0){ 
                rackGroup.remove(rackGroup.children[0]); 
            }

            // Materiales con propiedades físicas de sombreado
            const materialPoste = new THREE.MeshStandardMaterial({ color: 0x1e3a8a, roughness: 0.4 }); // Columnas Azules
            const materialViga = new THREE.MeshStandardMaterial({ color: 0xea580c, roughness: 0.3 });  // Vigas Naranjas

            const anchoRack = 2.5;   // Metros de largo
            const fondoRack = 1.0;   // Metros de profundidad
            const alturaNivel = 1.0; // Espaciado vertical entre repisas
            const grosorPoste = 0.1;
            const grosorViga = 0.06;

            const alturaTotal = (niveles * alturaNivel) + 0.5;

            // Dibujar los 4 Postes Principales
            const posicionesX = [-anchoRack/2, anchoRack/2];
            const posicionesZ = [-fondoRack/2, fondoRack/2];

            posicionesX.forEach(x => {
                posicionesZ.forEach(z => {
                    const geomPoste = new THREE.BoxGeometry(grosorPoste, alturaTotal, grosorPoste);
                    const poste = new THREE.Mesh(geomPoste, materialPoste);
                    poste.position.set(x, alturaTotal / 2, z);
                    poste.castShadow = true;
                    poste.receiveShadow = true;
                    rackGroup.add(poste);
                });
            });

            // Dibujar los niveles/vigas horizontales
            for (let i = 1; i <= niveles; i++) {
                const alturaVigaActual = i * alturaNivel;

                // Viga Delantera
                const geomVigaFrontal = new THREE.BoxGeometry(anchoRack - grosorPoste, grosorViga, grosorViga);
                const vigaFrontal = new THREE.Mesh(geomVigaFrontal, materialViga);
                vigaFrontal.position.set(0, alturaVigaActual, fondoRack/2);
                vigaFrontal.castShadow = true;
                rackGroup.add(vigaFrontal);

                // Viga Trasera Colocada
                const vigaTrasera = vigaFrontal.clone();
                vigaTrasera.position.set(0, alturaVigaActual, -fondoRack/2);
                rackGroup.add(vigaTrasera);
            }
        }

        // --- 4. CONSULTA AUTOMÁTICA A SUPABASE ---
        async function cargarUltimaCotizacion() {
            try {
                // Trae la fila más reciente desde la tabla "cotizaciones"
                const { data, error } = await supabaseClient
                    .from('cotizaciones')
                    .select('*')
                    .order('created_at', { ascending: false }) 
                    .limit(1)
                    .single();

                if (error) throw error;
                if (!data) {
                    document.getElementById('data-tipo').innerText = "Sin registros";
                    return;
                }

                // Si el ID de la fila es el mismo que ya procesamos, ignoramos para no parpadear el 3D
                if (data.id === ultimoIdProcesado) return;
                ultimoIdProcesado = data.id;

                const variables = data.variables_json;

                // Inyectar dinámicamente los campos en el HTML lateral
                document.getElementById('data-tipo').innerText = variables.tipo_rack || "No especificado";
                document.getElementById('data-niveles').innerText = variables.numero_niveles || 0;
                document.getElementById('data-peso').innerText = (variables.peso_maximo_por_nivel_kg || 0).toLocaleString() + " kg";
                document.getElementById('data-comentarios').innerText = variables.comentarios_adicionales || "Sin comentarios técnicos.";

                // Re-renderizar el objeto 3D de forma reactiva
                const cantNiveles = parseInt(variables.numero_niveles) || 1;
                dibujarRack3D(cantNiveles);

            } catch (err) {
                console.error("Error consultando Supabase automáticamente:", err);
            }
        }

        // --- 5. ORQUESTACIÓN Y LOOPS DE EJECUCIÓN ---
        
        // Renderizar un esqueleto guía inicial al segundo cero
        dibujarRack3D(1);

        // Carga inmediata automática al abrir la URL
        cargarUltimaCotizacion();

        // Sistema de Escucha Cíclico (Polling): Ejecuta la consulta cada 4000 milisegundos (4 segundos)
        setInterval(() => {
            cargarUltimaCotizacion();
        }, 4000);

        // Loop continuo para mantener el renderizado de Three.js responsivo al mouse
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Ajustar el canvas 3D si el usuario rota o redimensiona la pantalla del celular/computadora
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
