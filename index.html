<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D Selectivo Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden">

    <header class="bg-gray-800 p-4 shadow-lg flex justify-between items-center z-10">
        <h1 class="text-xl font-bold text-orange-500">Plataforma Racks Industrial - Modelo Selectivo Estructural</h1>
        <div class="flex items-center gap-2">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <div class="text-sm text-gray-400">Réplica Estructural Activa</div>
        </div>
    </header>

    <div class="flex flex-1 h-full relative">
        <div class="w-80 bg-gray-800 p-6 shadow-2xl flex flex-col gap-4 z-10 overflow-y-auto">
            <h2 class="text-lg font-semibold border-b border-gray-700 pb-2 text-gray-300">Variables Detectadas</h2>
            
            <div>
                <label class="text-xs text-gray-400 block font-medium">TIPO DE RACK</label>
                <div id="data-tipo" class="bg-gray-700 p-2 rounded mt-1 font-mono text-orange-400">Conectando...</div>
            </div>

            <div>
                <label class="text-xs text-gray-400 block font-medium">NÚMERO DE NIVELES</label>
                <div id="data-niveles" class="bg-gray-700 p-2 rounded mt-1 font-mono">0</div>
            </div>

            <div>
                <label class="text-xs text-gray-400 block font-medium">PESO MÁXIMO POR NIVEL</label>
                <div id="data-peso" class="bg-gray-700 p-2 rounded mt-1 font-mono text-green-400">0 kg</div>
            </div>

            <div class="mt-4 bg-gray-950 p-3 rounded border border-gray-700 flex-1">
                <span class="text-xs font-bold text-blue-400 block mb-1">💡 Notas Técnicas de la IA:</span>
                <p id="data-comentarios" class="text-xs text-gray-400 leading-relaxed font-sans">Sincronizando geometría industrial avanzada...</p>
            </div>
        </div>

        <div id="canvas-container" class="flex-1 w-full h-full bg-gray-950"></div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DE SUPABASE ---
        const SUPABASE_URL = "https://ltetbljizxngcwszyzmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0ZXRibGppenhuZ2N3c3p5em1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTc0MzMsImV4cCI6MjA5Nzg5MzQzM30.ThZMYsYyHv0eC2PxSV-NmqJySwSY3Y32tK8QrHEivaw";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let ultimoIdProcesado = null;

        // --- 2. CONFIGURACIÓN DE SCENE & THREE.JS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);

        const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(4, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.2, 0);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(6, 12, 8);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const gridHelper = new THREE.GridHelper(20, 20, 0x475569, 0x334155);
        scene.add(gridHelper);

        let rackGroup = new THREE.Group();
        scene.add(rackGroup);

        // --- 3. NUEVA LÓGICA DE GEOMETRÍA INDUSTRIAL SELECTIVA (REPLICA SKETCHUP) ---
        function dibujarRack3D(niveles, fondoPosteMM, peralteCM, tieneEscalon) {
            while(rackGroup.children.length > 0){ 
                rackGroup.remove(rackGroup.children[0]); 
            }

            // Colores exactos del modelo industrial (Azul Ral y Naranja Eléctrico)
            const materialPoste = new THREE.MeshStandardMaterial({ color: 0x1d4ed8, roughness: 0.3, metalness: 0.3 }); // Marcos
            const materialViga = new THREE.MeshStandardMaterial({ color: 0xea580c, roughness: 0.2, metalness: 0.4 });  // Largueros
            const materialGalvanizado = new THREE.MeshStandardMaterial({ color: 0x94a3b8, roughness: 0.4, metalness: 0.6 }); // Diagonales

            const anchoRack = 2.5;   
            const fondoRack = 1.0;   
            const alturaNivel = 1.1; 
            
            const grosorPosteX = 0.08; 
            const grosorPosteZ = fondoPosteMM / 1000; 
            const altoViga = peralteCM / 100;         
            const anchoVigaZ = 0.05;                  

            const alturaTotal = (niveles * alturaNivel) + 0.4;

            // 1. DIBUJAR LOS MARCOS LATERALES (Postes + Diagonales de Celosía)
            const posicionesX = [-anchoRack/2, anchoRack/2];
            const posicionesZ = [-fondoRack/2, fondoRack/2];

            posicionesX.forEach(x => {
                // Postes verticales del marco
                posicionesZ.forEach(z => {
                    const geomPoste = new THREE.BoxGeometry(grosorPosteX, alturaTotal, grosorPosteZ);
                    const poste = new THREE.Mesh(geomPoste, materialPoste);
                    poste.position.set(x, alturaTotal / 2, z);
                    poste.castShadow = true;
                    poste.receiveShadow = true;
                    rackGroup.add(poste);
                });

                // Arriostramiento / Diagonales de seguridad (Cruces transversales del marco lateral)
                const numCruces = niveles * 2;
                const intervaloH = alturaTotal / numCruces;
                
                for (let j = 0; j < numCruces; j++) {
                    const zInicio = (j % 2 === 0) ? -fondoRack/2 : fondoRack/2;
                    const zFin = (j % 2 === 0) ? fondoRack/2 : -fondoRack/2;
                    const yInicio = j * intervaloH;
                    const yFin = (j + 1) * intervaloH;

                    // Calcular distancia y ángulo para la diagonal metálica
                    const dx = 0;
                    const dy = yFin - yInicio;
                    const dz = zFin - zInicio;
                    const longitud = Math.sqrt(dy*dy + dz*dz);

                    const geomDiagonal = new THREE.BoxGeometry(0.02, 0.04, longitud);
                    const diagonal = new THREE.Mesh(geomDiagonal, materialGalvanizado);
                    
                    diagonal.position.set(x, (yInicio + yFin) / 2, 0);
                    diagonal.lookAt(new THREE.Vector3(x, yFin, zFin));
                    rackGroup.add(diagonal);
                }

                // Travesaños horizontales base y tope del marco
                [0.05, alturaTotal - 0.05].forEach(yPos => {
                    const geomHorizontal = new THREE.BoxGeometry(0.03, 0.04, fondoRack - grosorPosteZ);
                    const horiz = new THREE.Mesh(geomHorizontal, materialGalvanizado);
                    horiz.position.set(x, yPos, 0);
                    rackGroup.add(horiz);
                });
            });

            // 2. DIBUJAR LARGUEROS CON CONECTORES DE SEGURIDAD (GARRAS)
            for (let i = 1; i <= niveles; i++) {
                const alturaVigaActual = i * alturaNivel;

                for (let lado = -1; lado <= 1; lado += 2) {
                    const zPos = (fondoRack / 2) * lado;

                    // Cuerpo principal del larguero (Horizontal)
                    const geomVigaRect = new THREE.BoxGeometry(anchoRack - grosorPosteX, altoViga, anchoVigaZ);
                    const viga = new THREE.Mesh(geomVigaRect, materialViga);
                    viga.position.set(0, alturaVigaActual, zPos);
                    viga.castShadow = true;
                    rackGroup.add(viga);

                    // Conectores / Garras terminales (Los ganchos naranjas que abrazan el poste vertical)
                    [-1, 1].forEach(posXSigno => {
                        const xConector = (anchoRack / 2 - grosorPosteX / 2) * posXSigno;
                        const geomConector = new THREE.BoxGeometry(0.01, altoViga + 0.04, anchoVigaZ * 1.4);
                        const conector = new THREE.Mesh(geomConector, materialViga);
                        conector.position.set(xConector + (0.005 * -posXSigno), alturaVigaActual, zPos);
                        rackGroup.add(conector);
                    });
                }
            }
        }

        // --- 4. CONSULTA AUTOMÁTICA A SUPABASE ---
        async function cargarUltimaCotizacion() {
            try {
                const { data, error } = await supabaseClient
                    .from('cotizaciones')
                    .select('*')
                    .order('created_at', { ascending: false }) 
                    .limit(1)
                    .single();

                if (error) throw error;
                if (!data) return;

                if (data.id === ultimoIdProcesado) return;
                ultimoIdProcesado = data.id;

                const variables = data.variables_json;
                const comentarios = (variables.comentarios_adicionales || "").toLowerCase();

                let fondoPosteMM = 73; 
                if (comentarios.includes("73 mm") || comentarios.includes("73mm")) fondoPosteMM = 73;
                else if (comentarios.includes("90 mm") || comentarios.includes("90mm")) fondoPosteMM = 90;

                let peralteCM = 10; 
                if (comentarios.includes("12.5")) peralteCM = 12.5;
                else if (comentarios.includes("15")) peralteCM = 15;
                else if (comentarios.includes("10")) peralteCM = 10;

                const tieneEscalon = comentarios.includes("con escalón") || comentarios.includes("con escalon");

                document.getElementById('data-tipo').innerText = variables.tipo_rack || "Selectivo Industrial";
                document.getElementById('data-niveles').innerText = variables.numero_niveles || 0;
                document.getElementById('data-peso').innerText = (variables.peso_maximo_por_nivel_kg || 0).toLocaleString() + " kg";
                document.getElementById('data-comentarios').innerText = variables.comentarios_adicionales || "Sin comentarios.";

                const cantNiveles = parseInt(variables.numero_niveles) || 1;
                dibujarRack3D(cantNiveles, fondoPosteMM, peralteCM, tieneEscalon);

            } catch (err) {
                console.error("Error en sincronización paramétrica:", err);
            }
        }

        // --- 5. RUNTIME ---
        dibujarRack3D(1, 73, 10, false);
        cargarUltimaCotizacion();

        setInterval(() => {
            cargarUltimaCotizacion();
        }, 4000);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
